{% load static %} 
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Bose Service Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #f8f8f8;
            color: #333;
            line-height: 1.6;
            font-family: 'Roboto Slab', serif;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            text-align: center;
        }
        .error-code {
            font-size: 120px;
            font-weight: 700;
            color: #111;
            margin-bottom: 20px;
            line-height: 1;
        }
        .error-title {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
        }
        .error-message {
            font-size: 18px;
            max-width: 600px;
            margin-bottom: 40px;
            color: #666;
        }
        .action-buttons {
            display: flex;
            gap: 20px;
            margin-bottom: 60px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 4px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background-color: #3e3c3c;
            color: white;
            border: 2px solid #000;
        }
        .btn-primary:hover {
            background-color: #3e3c3c;
            border-color: #000;
        }
        @media (max-width: 768px) {
            .error-code { font-size: 80px; }
            .error-title { font-size: 24px; }
            .error-message { font-size: 16px; }
            .action-buttons {
                flex-direction: column;
                gap: 15px;
            }
            .btn {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <main class="content">
            <h1 class="error-code">404</h1>
            <h2 class="error-title">Page Not Found</h2>
            <p class="error-message">
                We're sorry, but the page you're looking for doesn't exist or has been moved. 
                Please check the URL or try searching for what you need.
            </p>
            <div class="action-buttons">
                <a href="{% url 'base_index' %}" class="btn btn-primary">Go to Homepage</a>
            </div>
        </main>
    </div>
</body>
</html>
