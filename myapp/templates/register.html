<head>

<section id="login">
  <div class="container">
    <div class="loginwrap">
      <div class="row">
        <div class="col-12 col-sm-12 col-md-12 col-lg-12">
          <div class="login-form">
            <h2 class="mb-4">Create a new account</h2>
            <form>
              <div class="row gx-3">
                <div class="mb-3 col-12 col-sm-12 col-md-6 col-lg-6">
                  <label for="fname" class="form-label visually-hidden">First Name</label>
                  <input type="text" class="form-control pl-25" id="fname" placeholder="First Name" name="fname">
                  <!--                  <i class="form-icon"><img src="images/icons/user-icon.png" alt="" title=""></i>--> 
                  <i class="form-icon fa fa-user"></i> 
                </div>
                <div class="mb-3 col-12 col-sm-12 col-md-6 col-lg-6">
                  <label for="lname" class="form-label visually-hidden">Last Name</label>
                  <input type="text" class="form-control pl-25" id="lname" placeholder="Last Name" name='lname'>
                  <!--                  <i class="form-icon"><img src="images/icons/user-icon.png" alt="" title=""></i> --> 
                  <i class="form-icon fa fa-user"></i> </div>
              </div>

               
              <div class="row">
                {% comment %} <span>hii</span> {% endcomment %}
                <div class="mb-3 col-12 col-sm-12 col-md-12 col-lg-12">
                  <label for="repeatpassword" class="form-label visually-hidden">Username</label>
                  <input type="text" class="form-control pl-25" id="username" placeholder="Enter username" name="username">
                  <!--                  <i class="form-icon"><img src="images/icons/password-icon.png" alt="" title=""></i> --> 
                  <i class="form-icon fa fa-user"></i> <i class="form-icon-right bi bi-eye pr-3"></i> 
                  <i class="form-icon-right bi bi-eye pr-3" id="toggle-password_username" style="cursor: pointer;"></i>
                </div>
                <span id="username_exits"></span>
              </div>

              <div class="row">
                <div class="mb-3 col-12 col-sm-12 col-md-12 col-lg-12">
                  <label for="email" class="form-label visually-hidden">Email address</label>
                  <input type="email" class="form-control pl-25" id="email" aria-describedby="emailHelp" placeholder="Enter email" name="email">
                  <!--                  <i class="form-icon"><img src="images/icons/mail-icon.png" alt="" title=""></i>--> 
                  <i class="form-icon fa fa-envelope"></i> </div>
              </div>
              <span id="email_exits"></span>
              <div class="row">
                <div class="mb-3 col-12 col-sm-12 col-md-12 col-lg-12">
                  <label for="password" class="form-label visually-hidden">Password</label>
                  <input type="password" class="form-control pl-25" id="password" placeholder="Password" name="password">
                  <!--                  <i class="form-icon"><img src="images/icons/password-icon.png" alt="" title=""></i> --> 
                  <i class="form-icon fa fa-lock"></i> <i class="form-icon-right bi bi-eye pr-3"></i>
                  <i class="form-icon-right bi bi-eye pr-3" id="toggle-password" style="cursor: pointer;"></i>
                 </div>
              </div>

              <button type="button" class="btn btn-primary subbuttn mt-3" id="register_now">Register Now</button>

<script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>


<script>
  $(document).ready(function(){

    $('#toggle-password').click(function(){
            // Toggle the input type between password and text
            var passwordField = $('#password');
            var passwordFieldType = passwordField.attr('type');

            if(passwordFieldType === 'password'){
                passwordField.attr('type', 'text'); // Show password as text
                $(this).removeClass('bi-eye-slash').addClass('bi-eye'); // Change eye icon to open
            } else {
                passwordField.attr('type', 'password'); // Hide password
                $(this).removeClass('bi-eye').addClass('bi-eye-slash'); // Change eye icon to slash
            }
        });


        $("#toggle-password_username").on('click',function(){
          let username=$("input[name='username']");
          var usernameFieldType = username.attr('type');
          $(this).removeClass('bi-eye-slash').addClass('bi-eye');
          if(usernameFieldType === 'password'){
            username.attr('type', 'text'); // Show password as text
                $(this).removeClass('bi-eye-slash').addClass('bi-eye'); // Change eye icon to open
            } else {
              username.attr('type', 'password'); // Hide password
                $(this).removeClass('bi-eye').addClass('bi-eye-slash'); // Change eye icon to slash
            }

        });

        $('#username').on('keyup', function () {
          const username = $(this).val();

          if (username) {
              $.ajax({
                  url: '{% url "check_username" %}',  // URL to your Django view
                  type: 'POST',
                  data: {
                      'username': username,
                      'csrfmiddlewaretoken': '{{ csrf_token }}'  // Include CSRF token
                  },
                  success: function(response) {
                      if(response.status === 200){
                          $("#username_exits").text(response.message).css("color", "white");;
                      }  else {
                          $("#username_exits").text('');
                      }
                  },
                  error: function(xhr, status, error) {
                      console.log('Error:', error);
                  }
              });
          } else {
              $("#username_exits").text('');
          }
      });

  $('#email').on('keyup', function () {
      const email = $(this).val();

      if (email) {
          $.ajax({
            url: '{% url "check_email" %}', 
            type: 'POST',
            data: {
                'email': email,
                'csrfmiddlewaretoken': '{{ csrf_token }}'
            },
              success: function(response) {
              if(response.status===200){

                $("#email_exits").text(response.message).css("color", "white");
              }else{
                $("#email_exits").text('')
              }
              
                },
                error: function(xhr, status, error) {
                    console.log('Error:', error);
                }
            });
        } else {
            $("#email_exits").text('');
        }
    });


  
          function validateForm() {
            var firstname = $("input[name='fname']").val().trim();
            var lastname = $("input[name='lname']").val().trim();
            var username = $("input[name='username']").val().trim();
            var email = $("input[name='email']").val().trim();
            var password = $("input[name='password']").val().trim();

            if (firstname && lastname && username && email && password) {
                  $("#register_now").prop('disabled', false);
              } else {
                  $("#register_now").prop('disabled', true);
              }
          }

              $("input").on('input', function() {
                  validateForm();
              });

              $(document).ready(function() {
                  validateForm();
              });



      $("#register_now").on('click', function() {
        $(this).prop('disabled', true);
        var formdata = new FormData()
        var firstname=$("input[name='fname']").val()
        var lastname=$("input[name='lname']").val()
        var username=$("input[name='username']").val()
        var email = $("input[name='email']").val()
        var password=$("input[name='password']").val()
        console.log(firstname,lastname,email,password,'==========================')
        formdata.append("first_name",firstname)
        formdata.append("last_name",lastname)
        formdata.append("username",username)
        formdata.append("email",email)
        formdata.append('password',password)


        $.ajax({
          method: "POST",
          url: "{% url 'create_registration' %}",
          data: formdata,
          datatype: "json",
          processData: false,
          contentType: false,

          success: function (data) {    
            
             if(data.status==200){
              sessionStorage.setItem('registration_message', 'Registration successful! Please login.');
              setTimeout(()=>{
                window.location.href = `https://www.boseservicecenter.co.in/login`;
              },1000)
             }else{
              alert('invalid try again !!')
              $("#register_now").prop('disabled', false);
             }

          },
          error: function() {
              // alert('An error occurred. Please try again later.');
              $("#register_now").prop('disabled', false); // Re-enable the button
          }
      })

    });
  


  });
</script>
  
{% endblock %}
