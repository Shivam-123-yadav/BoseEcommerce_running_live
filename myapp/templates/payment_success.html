<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You for Your Order</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .thank-you-container {
            background-color: #fff;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 80%;
            max-width: 600px;
        }
        .thank-you-container h1 {
            font-size: 22px;
            color: #2d3e50;
            margin-bottom: 15px;
        }
        .thank-you-container p {
            font-size: 14px;
            color: #555;
            margin-bottom: 28px;
        }
        .thank-you-container a {
            background-color: #28a745;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 4px;
            font-size: 16px;
        }
        .thank-you-container a:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
    <div class="thank-you-container">
        <h1>Thank you for your Order at Bose Service Center!</h1>
        <p>Your payment has been successfully processed.</p>
        <p>We are now preparing your order. You will receive a confirmation email shortly.</p>
        <a href="/">Return to Home</a>
    </div>
</body>
</html>
